<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Event 2025</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #0f2027, #203a43, #2c5364);
            color: #f1f1f1;
            text-align: center;
        }

        .container {
            width: 85%;
            max-width: 500px;
            padding: 25px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
        }

        h1 {
            color: #ffcc00;
        }

        h2 {
            color: #ff9900;
        }

        button {
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            background: #ff4500;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #e63900;
            transform: scale(1.05);
        }

        footer {
            margin-top: 20px;
        }

        footer a {
            color: #ffcc00;
            text-decoration: none;
        }

        footer a:hover {
            text-decoration: underline;
        }
    </style>

    <script>
        function registerEvent() {
            alert("Thank you for registering for Professional Event 2025!");
            document.getElementById("registerBtn").textContent = "Registration Completed";
        }
    </script>

</head>

<body>

<div class="container">

    <header>
        <h1>Professional Event 2025</h1>
        <p>Join us for an exclusive experience.</p>
    </header>

    <section>
        <h2>Event Details</h2>
        <p><strong>Date:</strong> December 15, 2025</p>
        <p><strong>Location:</strong> Grand Hall, City Center</p>
        <p><strong>Time:</strong> 10:00 AM - 5:00 PM</p>
    </section>

    <button id="registerBtn" onclick="registerEvent()">Register Now</button>

    <footer>
        <p>
            Contact:
            <a href="mailto:info@event2025.com">info@event2025.com</a> |
            Phone:
            <a href="tel:+916380772893">+91 6380772893</a>
        </p>
    </footer>

</div>

</body>
</html>
